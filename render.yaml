services:
  # ─── API Gateway ───────────────────────────────────────────
  - type: web
    name: spendsmart-gateway
    runtime: docker
    dockerfilePath: ./SpendSmart.Gateway/Dockerfile
    dockerContext: .
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: ASPNETCORE_URLS
        value: http://+:8080
      - key: AllowedOrigin
        sync: false  # Set to your Vercel URL after deploy

  # ─── Auth API ──────────────────────────────────────────────
  - type: web
    name: spendsmart-auth
    runtime: docker
    dockerfilePath: ./SpendSmart.Auth.API/Dockerfile
    dockerContext: .
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: ASPNETCORE_URLS
        value: http://+:8080
      - key: ConnectionStrings__DefaultConnection
        sync: false  # Set to Neon.tech PostgreSQL connection string
      - key: Jwt__Secret
        sync: false  # Set to a strong secret key

  # ─── Category API ──────────────────────────────────────────
  - type: web
